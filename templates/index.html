<!DOCTYPE html>
<html>
<head>
    <title>AI Readiness Reconciliation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Upload Transaction Data</h2>
    <form method="post" enctype="multipart/form-data" class="mt-4">
        <div class="mb-3">
            <label class="form-label">Internal Records (CSV)</label>
            <input type="file" name="internal_csv" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Bank Settlements (CSV)</label>
            <input type="file" name="bank_csv" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Run Reconciliation</button>
    </form>
</body>
</html>
